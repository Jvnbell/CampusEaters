<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CampusEats Control</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --warn: #ffcc00;
    --text: #e2e8f0;
    --muted: #4a6080;
    --btn: #0f1f35;
    --btn-hover: #1a3050;
    --green: #00ff88;
    --red: #ff3355;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-bottom: 32px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 3s linear infinite;
  }

  @keyframes scan {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  .logo span { color: var(--accent2); }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .status-dot.connected {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Panels */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
  }

  .panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Speed slider */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .speed-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.8rem;
    color: var(--accent);
    min-width: 52px;
    text-align: right;
    text-shadow: 0 0 10px rgba(0,212,255,0.3);
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(0,212,255,0.5);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:active {
    transform: scale(1.2);
  }

  /* D-pad */
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    aspect-ratio: 1;
    max-width: 280px;
    margin: 0 auto;
  }

  .btn {
    background: var(--btn);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    user-select: none;
    position: relative;
    overflow: hidden;
    min-height: 72px;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.1s;
    border-radius: inherit;
  }

  .btn:active::after { opacity: 0.15; }

  .btn:active {
    transform: scale(0.94);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.2);
  }

  .btn.fwd    { grid-column: 2; grid-row: 1; }
  .btn.fl     { grid-column: 1; grid-row: 2; }
  .btn.stop   { grid-column: 2; grid-row: 2; background: #1a0a0a; border-color: #3a1515; }
  .btn.fr     { grid-column: 3; grid-row: 2; }
  .btn.bwd    { grid-column: 2; grid-row: 3; }

  .btn.stop:active { border-color: var(--red); box-shadow: 0 0 12px rgba(255,51,85,0.3); }
  .btn.stop::after { background: var(--red); }

  .btn .label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    position: absolute;
    bottom: 6px;
  }

  /* Sharp turn buttons */
  .turn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-sharp {
    background: var(--btn);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    transition: all 0.1s;
    user-select: none;
    font-family: 'Share Tech Mono', monospace;
  }

  .btn-sharp:active {
    transform: scale(0.96);
    border-color: var(--accent2);
    box-shadow: 0 0 12px rgba(255,107,53,0.2);
    background: rgba(255,107,53,0.08);
  }

  /* Status log */
  .log {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.6;
    max-height: 120px;
    overflow-y: auto;
    padding: 2px 0;
  }

  .log .entry {
    padding: 2px 0;
    border-bottom: 1px solid rgba(30,58,95,0.4);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log .entry .time { color: var(--accent); margin-right: 8px; }
  .log .entry .msg { color: #7a9abf; }

  /* Auto mode button */
  .btn-auto {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #0f2a1a, #0a1f12);
    border: 1px solid #1a4a2a;
    border-radius: 12px;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-auto:active {
    transform: scale(0.98);
    box-shadow: 0 0 20px rgba(0,255,136,0.2);
  }

  .btn-auto.active {
    background: linear-gradient(135deg, #0a2a1a, #0f3520);
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(0,255,136,0.15);
    animation: autoPulse 1.5s infinite;
  }

  @keyframes autoPulse {
    0%, 100% { box-shadow: 0 0 10px rgba(0,255,136,0.1); }
    50% { box-shadow: 0 0 25px rgba(0,255,136,0.3); }
  }

  /* Motor meters */
  .meters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .meter {
    text-align: center;
  }

  .meter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .meter-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .meter-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px;
    transition: width 0.2s;
    width: 0%;
  }

  .meter-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">Campus<span>Eats</span></div>
    <div class="status-label">
      <span id="statusText">OFFLINE</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </header>

  <!-- Speed Control -->
  <div class="panel">
    <div class="panel-title">// speed control</div>
    <div class="speed-row">
      <div class="speed-value" id="speedVal">150</div>
      <input type="range" id="speedSlider" min="0" max="255" value="150">
    </div>
  </div>

  <!-- D-Pad -->
  <div class="panel">
    <div class="panel-title">// directional control</div>
    <div class="dpad">
      <button class="btn fwd" ontouchstart="sendCmd('f')" onmousedown="sendCmd('f')">
        ▲ <span class="label">FWD</span>
      </button>
      <button class="btn fl" ontouchstart="sendCmd('fl')" onmousedown="sendCmd('fl')">
        ◀ <span class="label">LEFT</span>
      </button>
      <button class="btn stop" ontouchstart="sendCmd('s')" onmousedown="sendCmd('s')">
        ■ <span class="label">STOP</span>
      </button>
      <button class="btn fr" ontouchstart="sendCmd('fr')" onmousedown="sendCmd('fr')">
        ▶ <span class="label">RIGHT</span>
      </button>
      <button class="btn bwd" ontouchstart="sendCmd('b')" onmousedown="sendCmd('b')">
        ▼ <span class="label">BWD</span>
      </button>
    </div>
  </div>

  <!-- Sharp Turns -->
  <div class="panel">
    <div class="panel-title">// sharp turns (pivot)</div>
    <div class="turn-row">
      <button class="btn-sharp" ontouchstart="sendCmd('fl')" onmousedown="sendCmd('fl')">
        ↺ PIVOT L
      </button>
      <button class="btn-sharp" ontouchstart="sendCmd('fr')" onmousedown="sendCmd('fr')">
        PIVOT R ↻
      </button>
      <button class="btn-sharp" ontouchstart="sendCmd('bl')" onmousedown="sendCmd('bl')">
        ↺ BACK L
      </button>
      <button class="btn-sharp" ontouchstart="sendCmd('br')" onmousedown="sendCmd('br')">
        BACK R ↻
      </button>
    </div>
  </div>

  <!-- Motor Status -->
  <div class="panel">
    <div class="panel-title">// motor telemetry</div>
    <div class="meters">
      <div class="meter">
        <div class="meter-label">RIGHT MOTOR (A)</div>
        <div class="meter-bar-bg"><div class="meter-bar" id="meterA"></div></div>
        <div class="meter-val" id="valA">0</div>
      </div>
      <div class="meter">
        <div class="meter-label">LEFT MOTOR (B)</div>
        <div class="meter-bar-bg"><div class="meter-bar" id="meterB"></div></div>
        <div class="meter-val" id="valB">0</div>
      </div>
    </div>
  </div>

  <!-- Auto Mode -->
  <button class="btn-auto" id="autoBtn" onclick="toggleAuto()">
    ◈ AUTONOMOUS MODE
  </button>

  <!-- Log -->
  <div class="panel">
    <div class="panel-title">// system log</div>
    <div class="log" id="log"></div>
  </div>

</div>

<script>
  let currentSpeed = 150;
  let autoMode = false;
  let statusInterval;

  const slider = document.getElementById('speedSlider');
  const speedVal = document.getElementById('speedVal');

  slider.addEventListener('input', () => {
    currentSpeed = parseInt(slider.value);
    speedVal.textContent = currentSpeed;
  });

  slider.addEventListener('change', () => {
    fetch('/speed', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({value: currentSpeed})
    });
    log(`Speed set to ${currentSpeed}`);
  });

  function sendCmd(cmd) {
    const names = {
      f:'Forward', b:'Backward', s:'STOP',
      fr:'Pivot Right', fl:'Pivot Left',
      br:'Back Right', bl:'Back Left'
    };

    fetch(`/cmd/${cmd}`, {method: 'POST'})
      .then(r => r.json())
      .then(data => {
        log(names[cmd] || cmd);

        // Only send speed for straight moves — not turns or stop.
        // Turns use Arduino's FULL_SPEED internally so one wheel
        // stays at 0. Sending speed here would override that.
        // 500ms delay lets direction change settle before ramping.
        if (cmd === 'f') {
          setTimeout(() => {
            fetch('/speed', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({value: currentSpeed})
            });
          }, 500);
        }
      })
      .catch(() => log('Connection error', true));
  }

  function toggleAuto() {
    autoMode = !autoMode;
    const btn = document.getElementById('autoBtn');
    btn.classList.toggle('active', autoMode);
    btn.textContent = autoMode ? '◈ AUTONOMOUS — ACTIVE' : '◈ AUTONOMOUS MODE';
    log(autoMode ? 'Autonomous mode ENABLED' : 'Autonomous mode DISABLED');
    // Will hook into navigation script later
  }

  function log(msg, isError = false) {
    const logEl = document.getElementById('log');
    const now = new Date();
    const time = now.toTimeString().slice(0,8);
    const entry = document.createElement('div');
    entry.className = 'entry';
    entry.innerHTML = `<span class="time">${time}</span><span class="msg" style="${isError ? 'color:#ff3355' : ''}">${msg}</span>`;
    logEl.insertBefore(entry, logEl.firstChild);
    // Keep only last 20 entries
    while (logEl.children.length > 20) logEl.removeChild(logEl.lastChild);
  }

  function updateStatus() {
    fetch('/status')
      .then(r => r.json())
      .then(data => {
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        if (data.connected) {
          dot.classList.add('connected');
          txt.textContent = 'ONLINE';
        } else {
          dot.classList.remove('connected');
          txt.textContent = 'OFFLINE';
        }
        // Parse motor speeds from last_response if available
        const resp = data.last_response || '';
        const aMatch = resp.match(/Speed:\s*(\d+)/g);
        if (aMatch && aMatch.length >= 2) {
          const a = parseInt(aMatch[0].match(/\d+/)[0]);
          const b = parseInt(aMatch[1].match(/\d+/)[0]);
          document.getElementById('meterA').style.width = (a/255*100) + '%';
          document.getElementById('meterB').style.width = (b/255*100) + '%';
          document.getElementById('valA').textContent = a;
          document.getElementById('valB').textContent = b;
        }
      })
      .catch(() => {
        document.getElementById('statusDot').classList.remove('connected');
        document.getElementById('statusText').textContent = 'OFFLINE';
      });
  }

  // Poll status every 2 seconds
  updateStatus();
  statusInterval = setInterval(updateStatus, 2000);

  log('CampusEats control interface ready');
</script>
</body>
</html>
